# akiya-watch 監視対象定義（マスタ）
# status: verified = URL実在確認済み / derived = 導出（初回実行で要検証）
# channel: ①公開ポータル ②公的誘導 ③業者内流通 ④個人掲示板 ⑤強制換価 ⑥公有財産
# kind: 主な対象種別。filter_keywords: 県・郡ページから対象市町だけ抽出するキーワード
# 注意: URLは唯一のマスタ。記憶・推測で生成・修正しない（CLAUDE.md 恒久ルール）

# ============================================================================
# 適合判定パラメータ（このブロックが唯一の定義元。watch.py へのコード直書き禁止）
# ----------------------------------------------------------------------------
#   price_max_man         : 旧・全種別共通の価格上限（後方互換。種別別が優先）
#   area_min_sqm          : 適合とみなす土地面積の下限。単位=㎡（維持）
#   price_ceiling_by_type : 種別ごとの価格上限（万円）。適合判定に使用・画面で可変
#   exclude_areas         : 所在地一致で既定除外するNGエリア（別荘地）。ハード除外は
#                           せず、HTMLのトグル既定ONで隠す。除外ログ(監査)に残す
#   exclude_keywords      : 空（建築可否では機械除外しない）
#   caution_keywords      : 注意フラグ（除外しない。画面でキーワード除外トグル可）
#   interest_keywords     : 本命シグナル（除外しない・注目印）
# ============================================================================
filters:
  price_max_man: 1000
  area_min_sqm: 330
  price_ceiling_by_type:
    更地: 1500
    古家付き土地: 1500
    中古戸建: 3000
    空き家: 3000
  exclude_areas: [南箱根ダイヤランド, パサディナタウン, 東大場, エメラルドタウン, 富士見ニュータウン]
  exclude_keywords: []
  caution_keywords: [再建築不可, 要相談, 調査中, 農地転用, 既存不適格, 崖条例, 別荘地, 管理費, 借地, 定期借地, 青地, 農振, 温泉]
  interest_keywords: [既存宅地, 線引き前宅地, 市街化調整区域, 調整区域, 34条11号, 34条12号, 43条, 再建築可, 建替可, 適合証明, 白地, 無指定]

